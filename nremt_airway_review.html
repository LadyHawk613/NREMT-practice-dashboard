<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>NREMT Airway & Ventilation Review</title>
<style>
  :root{
    --bg:#0d1414; --panel:#141d1d; --panel-raised:#1a2626; --line:#2a3838;
    --text:#e8efe9; --text-dim:#8fa39c; --amber:#e8a13a; --green:#4a9a6f; --red:#d1483f;
    --mono:'IBM Plex Mono',Consolas,monospace; --sans:'IBM Plex Sans',-apple-system,sans-serif;
  }
  @import url('https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@500;600;700&family=IBM+Plex+Sans:wght@400;500;600;700&display=swap');
  *{box-sizing:border-box; margin:0; padding:0;}
  body{
    background:var(--bg); color:var(--text); font-family:var(--sans);
    min-height:100vh; display:flex; justify-content:center; padding:20px 14px 50px;
  }
  .app{ width:100%; max-width:520px; }
  .card{ background:var(--panel); border:1px solid var(--line); border-radius:8px; padding:24px 20px; position: relative; }
  .badge{
    font-family:var(--mono); font-size:10.5px; padding:4px 9px; border-radius:4px;
    background:rgba(232,161,58,0.12); color:var(--amber); border:1px solid #8a6a33;
    display:inline-block; margin-bottom:14px; letter-spacing:0.05em;
  }
  .progress{
    position: absolute; top: 24px; right: 20px; font-family: var(--mono); font-size: 12px; color: var(--text-dim);
  }
  .scenario{ font-size:14px; color:var(--text-dim); line-height:1.6; margin-bottom:10px; padding-left:12px; border-left:2px solid var(--line); }
  .question{ font-size:16.5px; font-weight:600; line-height:1.5; margin-bottom:8px; }
  .instructions{ font-size:12.5px; color:var(--text-dim); margin-bottom:18px; font-family:var(--mono); }

  .list{ position:relative; display:flex; flex-direction:column; gap:8px; margin-bottom:20px; }

  .item{
    display:flex; align-items:center; gap:10px;
    background:var(--panel-raised); border:1px solid var(--line); border-radius:6px;
    padding:12px 12px; user-select:none; -webkit-user-select:none;
    touch-action:none; font-size:14px; line-height:1.4;
    transition:border-color .15s, background .15s, box-shadow .15s;
    position:relative; z-index:1;
  }
  .item.dragging{
    z-index:50; cursor:grabbing; box-shadow:0 10px 24px rgba(0,0,0,0.5);
    border-color:var(--amber); background:#1f2d2d;
  }
  .item .num{
    font-family:var(--mono); font-weight:700; font-size:12px; color:var(--text-dim);
    border:1px solid var(--line); border-radius:4px; width:24px; height:24px;
    display:flex; align-items:center; justify-content:center; flex-shrink:0;
  }
  .item .grip{
    margin-left:auto; padding-left:10px; color:var(--text-dim);
    font-size:16px; letter-spacing:2px; cursor:grab; flex-shrink:0;
    touch-action:none;
  }
  .item.dragging .grip{ cursor:grabbing; color:var(--amber); }
  .item .label-text{ flex:1; }

  .item.correct{ border-color:var(--green); background:rgba(74,154,111,0.1); }
  .item.incorrect{ border-color:var(--red); background:rgba(209,72,63,0.1); }
  .item.correct .num{ border-color:var(--green); color:var(--green); }
  .item.incorrect .num{ border-color:var(--red); color:var(--red); }

  .controls { display: flex; flex-direction: column; gap: 8px; }
  button.primary{
    width:100%; padding:14px; font-size:14.5px; font-weight:600;
    background:var(--amber); color:#1a1206; border:none; border-radius:6px; cursor:pointer;
  }
  button.primary:disabled{ opacity:0.5; cursor:default; }
  button.secondary{
    width:100%; padding:12px; font-size:13.5px; font-weight:600;
    background:transparent; color:var(--text); border:1px solid var(--line); border-radius:6px; cursor:pointer;
  }
  .feedback{
    margin-top:16px; padding:13px 14px; border-radius:6px; font-size:13.5px; line-height:1.6;
    display:none;
  }
  .feedback.show{ display:block; }
  .feedback.pass{ background:rgba(74,154,111,0.1); border:1px solid var(--green); }
  .feedback.fail{ background:rgba(209,72,63,0.1); border:1px solid var(--red); }
  .feedback .label{ font-family:var(--mono); font-size:11px; text-transform:uppercase; letter-spacing:0.06em; margin-bottom:6px; display:block; }
  .feedback.pass .label{ color:var(--green); }
  .feedback.fail .label{ color:var(--red); }
</style>
</head>
<body>
<div class="app">
  <div class="card">
    <div class="progress" id="progress">1 / 3</div>
    <span class="badge">NREMT · Airway & Ventilation</span>
    <div class="scenario" id="scenario"></div>
    <div class="question" id="question"></div>
    <div class="instructions">Drag rows to reorder. Correct order is required for NREMT skill proficiency.</div>

    <div class="list" id="itemList"></div>

    <div class="controls">
      <button class="primary" id="submitBtn">Submit order</button>
      <button class="secondary" id="nextBtn" style="display:none;">Next Question</button>
      <button class="secondary" id="resetBtn">Reset order</button>
    </div>

    <div class="feedback" id="feedback">
      <span class="label" id="fbLabel"></span>
      <span id="fbText"></span>
    </div>
  </div>
</div>

<script>
const QUESTIONS = [
  {
    scenario: "You arrive on scene to find a 45-year-old male unresponsive and snoring after a fall. You suspect a cervical spine injury.",
    question: "Sequence the initial airway management steps for this patient.",
    correctOrder: [
      "Perform a Jaw-thrust maneuver while maintaining C-spine stabilization",
      "Suction the oropharynx to clear any secretions or blood",
      "Insert an Oropharyngeal Airway (OPA) to maintain patency",
      "Assess the adequacy of breathing (rate, rhythm, and quality)",
      "Begin positive pressure ventilations with BVM if breathing is inadequate"
    ],
    feedback: "For suspected trauma, the Jaw-thrust is the preferred manual maneuver. Airway must be cleared (suctioned) before inserting adjuncts or ventilating."
  },
  {
    scenario: "An adult patient is in respiratory arrest. You are preparing to provide BVM ventilations with a single rescuer.",
    question: "Order the steps for effective BVM ventilation according to current NREMT standards.",
    correctOrder: [
      "Check for a pulse and breathing simultaneously (max 10 seconds)",
      "Open the airway manually and insert an appropriate airway adjunct",
      "Place the mask on the face using the E-C clamp technique",
      "Squeeze the bag to deliver 1 breath every 6 seconds (10 breaths/min)",
      "Observe for visible chest rise and fall with each ventilation",
      "Attach the BVM to a high-flow oxygen source (15 L/min)"
    ],
    feedback: "The current AHA/NREMT guideline for adult rescue breathing is 1 breath every 6 seconds. Pulse and breathing checks are performed simultaneously."
  },
  {
    scenario: "A 68-year-old female is in severe respiratory distress. She is alert, has crackles in her lungs, and a BP of 140/90.",
    question: "Sequence the steps for initiating CPAP (Continuous Positive Airway Pressure).",
    correctOrder: [
      "Confirm the patient is conscious and able to follow verbal commands",
      "Explain the procedure to the patient and coach their breathing",
      "Check blood pressure to ensure systolic is above 90-100 mmHg",
      "Assemble the CPAP circuit and connect it to an oxygen source",
      "Apply the mask and ensure a tight seal with the head straps",
      "Titrate the PEEP/pressure and monitor for clinical improvement"
    ],
    feedback: "CPAP requires an alert patient and adequate blood pressure, as it can decrease preload and lower BP further. Coaching is essential for patient compliance."
  }
];

let currentIdx = 0;
let currentItems = [];
let submitted = false;

const progressEl = document.getElementById('progress');
const scenarioEl = document.getElementById('scenario');
const questionEl = document.getElementById('question');
const listEl = document.getElementById('itemList');
const submitBtn = document.getElementById('submitBtn');
const nextBtn = document.getElementById('nextBtn');
const resetBtn = document.getElementById('resetBtn');
const feedback = document.getElementById('feedback');
const fbLabel = document.getElementById('fbLabel');
const fbText = document.getElementById('fbText');

function shuffle(arr, correct){
  let a = arr.slice();
  for(let i = a.length - 1; i > 0; i--){
    const j = Math.floor(Math.random() * (i+1));
    [a[i], a[j]] = [a[j], a[i]];
  }
  if(JSON.stringify(a) === JSON.stringify(correct)) return shuffle(arr, correct);
  return a;
}

function initQuestion(){
  const q = QUESTIONS[currentIdx];
  progressEl.textContent = (currentIdx + 1) + ' / ' + QUESTIONS.length;
  scenarioEl.textContent = q.scenario;
  questionEl.textContent = q.question;
  currentItems = shuffle(q.correctOrder, q.correctOrder);
  submitted = false;
  submitBtn.disabled = false;
  nextBtn.style.display = 'none';
  resetBtn.style.display = 'block';
  feedback.className = 'feedback';
  render();
}

function render(){
  listEl.innerHTML = '';
  currentItems.forEach((text, idx) => {
    const el = document.createElement('div');
    el.className = 'item';
    el.dataset.index = idx;
    el.innerHTML =
      '<span class="num">' + (idx+1) + '</span>' +
      '<span class="label-text">' + text + '</span>' +
      (submitted ? '' : '<span class="grip">⠿</span>');
    if(!submitted){
      el.addEventListener('pointerdown', onPointerDown);
    }
    listEl.appendChild(el);
  });
}

/* ---------------- Pointer-based click-and-drag reordering ---------------- */
let dragEl = null;
let dragStartY = 0;
let dragStartTop = 0;
let itemHeight = 0;
let placeholderIndex = 0;
let siblings = [];

function onPointerDown(e){
  if(submitted) return;
  dragEl = e.currentTarget;
  const rect = dragEl.getBoundingClientRect();
  const listRect = listEl.getBoundingClientRect();
  itemHeight = rect.height + 8; 
  dragStartY = e.clientY;
  dragStartTop = rect.top - listRect.top;
  placeholderIndex = parseInt(dragEl.dataset.index, 10);

  siblings = Array.from(listEl.children);
  listEl.style.position = 'relative';
  siblings.forEach((sib, i) => {
    const r = sib.getBoundingClientRect();
    sib.style.position = 'absolute';
    sib.style.top = (r.top - listRect.top) + 'px';
    sib.style.left = '0';
    sib.style.right = '0';
  });
  listEl.style.height = (siblings.length * itemHeight - 8) + 'px';

  dragEl.classList.add('dragging');
  dragEl.setPointerCapture(e.pointerId);

  document.addEventListener('pointermove', onPointerMove);
  document.addEventListener('pointerup', onPointerUp);
}

function onPointerMove(e){
  if(!dragEl) return;
  const delta = e.clientY - dragStartY;
  const newTop = dragStartTop + delta;
  dragEl.style.top = newTop + 'px';
  dragEl.style.zIndex = 50;

  const currentSlot = Math.max(0, Math.min(siblings.length - 1, Math.round(newTop / itemHeight)));
  if(currentSlot !== placeholderIndex){
    reorderSiblings(placeholderIndex, currentSlot);
    placeholderIndex = currentSlot;
  }
}

function reorderSiblings(fromIdx, toIdx){
  const moved = currentItems.splice(fromIdx, 1)[0];
  currentItems.splice(toIdx, 0, moved);

  siblings.forEach(sib => {
    if(sib === dragEl) return;
    const text = sib.querySelector('.label-text').textContent;
    const newIndex = currentItems.indexOf(text);
    sib.style.transition = 'top .15s ease';
    sib.style.top = (newIndex * itemHeight) + 'px';
  });
}

function onPointerUp(e){
  if(!dragEl) return;
  dragEl.classList.remove('dragging');
  dragEl.releasePointerCapture(e.pointerId);
  document.removeEventListener('pointermove', onPointerMove);
  document.removeEventListener('pointerup', onPointerUp);

  dragEl.style.transition = 'top .15s ease';
  dragEl.style.top = (placeholderIndex * itemHeight) + 'px';

  setTimeout(() => {
    listEl.style.height = '';
    siblings.forEach(sib => {
      sib.style.position = '';
      sib.style.top = '';
      sib.style.left = '';
      sib.style.right = '';
      sib.style.transition = '';
      sib.style.zIndex = '';
    });
    render();
  }, 160);
}

submitBtn.addEventListener('click', () => {
  submitted = true;
  const q = QUESTIONS[currentIdx];
  const allCorrect = JSON.stringify(currentItems) === JSON.stringify(q.correctOrder);
  render();
  document.querySelectorAll('.item').forEach((el, idx) => {
    el.classList.add(currentItems[idx] === q.correctOrder[idx] ? 'correct' : 'incorrect');
  });
  submitBtn.disabled = true;
  feedback.className = 'feedback show ' + (allCorrect ? 'pass' : 'fail');
  fbLabel.textContent = allCorrect ? 'Correct sequence' : 'Review sequence';
  fbText.textContent = allCorrect ? q.feedback : "Incorrect order detected. Correct order: \n" + q.correctOrder.join(" → ");
  
  if(allCorrect || submitted){
    nextBtn.style.display = currentIdx < QUESTIONS.length - 1 ? 'block' : 'none';
    resetBtn.style.display = allCorrect ? 'none' : 'block';
  }
});

nextBtn.addEventListener('click', () => {
  currentIdx++;
  initQuestion();
});

resetBtn.addEventListener('click', () => {
  initQuestion();
});

initQuestion();
</script>
</body>
</html>
